[respond] # enables M118
# M118 Extruder temp {printer.extruder.temperature}

# ==============================================================
# LDO Caselight
# ==============================================================

## Chamber Lighting - HE2 Connector
[output_pin caselight]
pin: PD15
pwm:true
shutdown_value: 0
value: 0
cycle_time: 0.01

# [gcode_macro CASELIGHT_ON]
# description: Helper: Light on
# gcode:
#   SET_PIN PIN=caselight VALUE=1.0
#   {action_respond_info("Caselight on")}
    
# [gcode_macro CASELIGHT_OFF]
# description: Helper: Light off
# gcode:
#   SET_PIN PIN=caselight VALUE=0.0
#   {action_respond_info("Caselight off")}

# [gcode_macro CASELIGHT]
# description: Toggle light
# gcode: {% if printer['output_pin caselight'].value == 0 %} CASELIGHT_ON {% else %} CASELIGHT_OFF {% endif %}

[gcode_macro SHOP_LIGHTS_ON]
gcode:
    {% for i in range(1,5) %}
        {% set brightness = i/4 %}
        # {action_respond_info(brightness|string)} # <-- this is how you print a variable
        G4 P1000 # in ms (so 1 second)
        SET_PIN PIN=caselight VALUE={brightness} #|float
    {% endfor %}

[gcode_macro LIGHTS_ON]
description: Helper: Lights on
gcode:
  SET_PIN PIN=caselight VALUE=1.0
  set_nozzle_leds_on
  # {action_respond_info("Case and nozzle lights on")}

[gcode_macro LIGHTS_DIM]
description: Helper: Lights 1%
gcode:
  SET_PIN PIN=caselight VALUE=0.01
  set_nozzle_leds_on
  # {action_respond_info("Case and nozzle lights on")}
    
[gcode_macro LIGHTS_OFF]
description: Helper: Lights off
gcode:
  SET_PIN PIN=caselight VALUE=0.0
  set_nozzle_leds_off
  # {action_respond_info("Case and nozzle lights off")}

[gcode_macro TOGGLE_DIM]
description: Toggle lights
gcode: 
    {% if printer['output_pin caselight'].value != 0.01 %} LIGHTS_DIM {% else %} LIGHTS_ON {% endif %}

    # {% set nozzle_red = printer['neopixel sb_leds'].color_data[1][0] %} # [led index][color index]
    # {% set nozzle_green = printer['neopixel sb_leds'].color_data[1][1] %}
    # {% set nozzle_blue = printer['neopixel sb_leds'].color_data[1][2] %}
    # {% set nozzle_white = printer['neopixel sb_leds'].color_data[1][3] %}

    # {% set rgbw_sum = nozzle_red + nozzle_green + nozzle_blue + nozzle_white %}
    # {% if rgbw_sum == 0.0 %} LIGHTS_ON {% else %} LIGHTS_OFF {% endif %}



# ==============================================================
# StealthBurner Neopixel
# ==============================================================

[neopixel sb_leds]
pin: PB0 # pin connected to the neopixel
chain_count: 3 # number of lights in the chain
color_order: GRBW # hardware type
initial_RED: 0.0 # start off (SB_STARTUP macro enables lights)
initial_GREEN: 0.0
initial_BLUE: 0.0
initial_WHITE: 0.0



# ------------------------------
# SB MACROS
# ------------------------------

# The following status macros are available (these go inside of your macros):
#
#    STATUS_READY
#    STATUS_OFF
#    STATUS_BUSY
#    STATUS_HEATING
#    STATUS_LEVELING
#    STATUS_HOMING
#    STATUS_CLEANING
#    STATUS_MESHING
#    STATUS_CALIBRATING_Z
#
# With additional macros for basic control:
#
#    SET_NOZZLE_LEDS_ON
#    SET_LOGO_LEDS_OFF
#    SET_NOZZLE_LEDS_OFF
#
# Contributed by Voron discord users wile.e, Tetsunosuke, and etherwalker


