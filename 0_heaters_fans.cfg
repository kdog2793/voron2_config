# ==============================================================
# BED HEATER
# ==============================================================

[heater_bed] # HE1 (SSR), TB (thermistor)
heater_pin: PA1 # using BED_OUT to control SSR
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PF3
max_power: 0.75 # Adjust Max Power so your heater doesn't warp your bed. Rule of thumb is 0.4 watts / cm^2 .
min_temp: 0
max_temp: 120
pwm_cycle_time: 0.0166 # 1/60 (to stop lights from flickering)

[idle_timeout]
timeout: 2100 # 35 minutes

#control: pid
#pid_kp: 58.437
#pid_ki: 2.347
#pid_kd: 363.769



# -------------------------------
# EXTRUDER HEATER
# -------------------------------

# Located in steppers section



# ==============================================================
# FANS
# ==============================================================

[fan] # Print Cooling Fan - FAN0
pin: PA8
kick_start_time: 0.5
off_below: 0.10

[heater_fan hotend_fan] # Hotend Fan - FAN1
pin: PE5
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0
# fan_speed: 1.0 <-- use if experiencing back flow

[controller_fan controller_fan] # Controller fan - FAN2 (electronics)
pin: PD12
kick_start_time: 0.5
heater: heater_bed
fan_speed: 0.3 # monitor this when bed is above 50 C !!!

[heater_fan exhaust_fan] # Exhaust fan - FAN3 (Nevermore)
pin: PD13
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 5.0
heater: heater_bed
heater_temp: 60
fan_speed: 1.0



# ==============================================================
# ADDITIONAL SENSORS
# ==============================================================

[temperature_sensor chamber_temp] # Chamber Temperature - T1
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PF5
min_temp: 0
max_temp: 100
gcode_id: chamber_th

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100
