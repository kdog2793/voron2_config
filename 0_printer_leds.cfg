    set_nozzle_leds_on

[gcode_macro status_printing]
gcode:
    _set_sb_leds_by_name leds="logo" color="printing" transmit=0
    set_nozzle_leds_on

# ------------------------------
# STARTUP, TRAM, PURGE, PRINT
# ------------------------------

[gcode_macro SB_STARTUP]
gcode:
    _set_sb_leds_by_name leds="logo" color="dim" transmit=0
    _set_sb_leds_by_name leds="nozzle" color="dim" transmit=1

